syntax = "proto2";
package mmo.proto_client;

message ItemSubclassEntry {
	required uint32 id = 1;
	required string name = 2;
	// The item class this subclass belongs to
	required uint32 itemclass = 3;
	// The proficiency required to use items of this subclass (0 = none)
	optional uint32 requiredproficiency = 4;
	// Names of the skeleton animation states played for auto attacks with a weapon of this
	// subclass (e.g. "SwordAttack01"). One is chosen at random per swing. Empty falls back to
	// the unarmed attack animation.
	repeated string attackanimation = 5;
	// Name of the skeleton animation state used as the combat-ready (attack idle) stance while
	// in combat with a weapon of this subclass (e.g. "SwordReady"). Empty falls back to the
	// unarmed ready animation.
	optional string readyanimation = 6;
	// Names of the skeleton animation states played for off-hand (dual wield) auto attacks with a
	// weapon of this subclass (e.g. "SwordAttackOffhand01"). One is chosen at random per off-hand
	// swing. Empty falls back to the main-hand attackanimation list, then the unarmed attack.
	repeated string offhand_attackanimation = 7;
}

message ItemSubclasses {
	repeated ItemSubclassEntry entry = 1;
}
